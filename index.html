    <canvas class="mouse-glow" id="glow"></canvas>

        </svg>
        nusantarapost.news →
    </a>

    <script>
const canvas = document.getElementById('glow');
const ctx = canvas.getContext('2d');

let mouseX = -9999;
let mouseY = -9999;

const SPACING = 8;
const DOT_RADIUS = 1;
const GLOW_RADIUS = 90;
const FADE_EXTRA = 200;

const r = 250;
const g = 249;
const b = 246;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();
window.addEventListener('resize', resize);

document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
}, { passive: true });

document.addEventListener('touchmove', (e) => {
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchstart', (e) => {
    mouseX = e.touches[0].clientX;
    mouseY = e.touches[0].clientY;
}, { passive: true });

document.addEventListener('touchend', () => {
    mouseX = -9999;
    mouseY = -9999;
}, { passive: true });

let lastMouseX = mouseX;
let lastMouseY = mouseY;

function animate() {
    if (mouseX === lastMouseX && mouseY === lastMouseY) {
        requestAnimationFrame(animate);
        return;
    }

    lastMouseX = mouseX;
    lastMouseY = mouseY;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const cols = Math.ceil(canvas.width / SPACING) + 1;
    const rows = Math.ceil(canvas.height / SPACING) + 1;
    const TOTAL_RADIUS = GLOW_RADIUS + FADE_EXTRA;

    ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;

    for (let i = 0; i < cols; i++) {
        for (let j = 0; j < rows; j++) {
            const x = i * SPACING;
            const y = j * SPACING;
            const dx = x - mouseX;
            const dy = y - mouseY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            const isBright = (i % 4 < 2) && (j % 4 < 2);
            const baseOpacity = isBright ? 0.10 : 0.05;

            let opacity;
            if (dist >= TOTAL_RADIUS) {
                opacity = baseOpacity;
            } else {
                const glow = 1 - dist / TOTAL_RADIUS;
                const eased = glow * glow * glow * glow * glow;
                opacity = baseOpacity + eased * (isBright ? 0.5 : 0.35);
            }

            ctx.globalAlpha = opacity;
            ctx.fillRect(x - DOT_RADIUS, y - DOT_RADIUS, DOT_RADIUS * 2, DOT_RADIUS * 2);
        }
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(animate);
}

animate();
    </script>
