    <style>

<body>
    <canvas id="glow" aria-hidden="true"></canvas>
    <p class="label">Coming Soon...</p>
    <div class="logotype" role="img" aria-label="The Nusantara Post"></div>
    <p class="tagline">Indonesia <s>New</s> News Capital</p>

    <a href="https://www.nusantarapost.news" class="news-link" target="_blank" rel="noopener noreferrer">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            style="vertical-align: middle; margin-right: 4px;" aria-hidden="true">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
        </svg>
        nusantarapost.news &#8594;
    </a>

    <script>
        (() => {
            const canvas = document.getElementById('glow');
            const ctx = canvas.getContext('2d', { alpha: true });

            const baseCanvas = document.createElement('canvas');
            const bCtx = baseCanvas.getContext('2d');

            const SPACING = 8;
            const DOT_RADIUS = 1;
            const DOT_SIZE = DOT_RADIUS * 2;
            const GLOW_RADIUS = 90;
            const FADE_EXTRA = 200;
            const TOTAL_RADIUS = GLOW_RADIUS + FADE_EXTRA;
            const TOTAL_RADIUS_SQ = TOTAL_RADIUS * TOTAL_RADIUS; // precompute

            const DOT_COLOR = 'rgb(250, 249, 246)';

            const BASE_BRIGHT = 0.10;
            const BASE_DIM = 0.05;

            const GLOW_BRIGHT = 0.75;
            const GLOW_DIM = 0.50;

            let mouseX = -9999;
            let mouseY = -9999;
            let lastX = null;
            let lastY = null;
            let needsRedraw = true;

            function renderBaseGrid() {
                bCtx.clearRect(0, 0, baseCanvas.width, baseCanvas.height);
                bCtx.fillStyle = DOT_COLOR;

                const cols = Math.ceil(baseCanvas.width / SPACING);
                const rows = Math.ceil(baseCanvas.height / SPACING);

                for (let i = 0; i < cols; i++) {
                    const iMod = i % 4 < 2;
                    for (let j = 0; j < rows; j++) {
                        const isBright = iMod && (j % 4 < 2);
                        bCtx.globalAlpha = isBright ? BASE_BRIGHT : BASE_DIM;
                        bCtx.fillRect(
                            i * SPACING - DOT_RADIUS,
                            j * SPACING - DOT_RADIUS,
                            DOT_SIZE,
                            DOT_SIZE
                        );
                    }
                }
                bCtx.globalAlpha = 1;
            }

            function resize() {
                const w = window.innerWidth;
                const h = window.innerHeight;
                canvas.width = w;
                canvas.height = h;
                baseCanvas.width = w;
                baseCanvas.height = h;
                renderBaseGrid();
                needsRedraw = true;
            }

            const updatePointer = (x, y) => {
                mouseX = x;
                mouseY = y;
            };

            const clearPointer = () => {
                mouseX = -9999;
                mouseY = -9999;
            };

            document.addEventListener('mousemove', (e) => {
                updatePointer(e.clientX, e.clientY);
            }, { passive: true });

            document.addEventListener('mouseleave', clearPointer);

            document.addEventListener('touchstart', (e) => {
                const t = e.touches[0];
                updatePointer(t.clientX, t.clientY);
            }, { passive: true });

            document.addEventListener('touchmove', (e) => {
                const t = e.touches[0];
                updatePointer(t.clientX, t.clientY);
            }, { passive: true });

            document.addEventListener('touchend', clearPointer, { passive: true });
            document.addEventListener('touchcancel', clearPointer, { passive: true });

            window.addEventListener('resize', resize);

            function animate() {
                if (!needsRedraw && mouseX === lastX && mouseY === lastY) {
                    requestAnimationFrame(animate);
                    return;
                }
                lastX = mouseX;
                lastY = mouseY;
                needsRedraw = false;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(baseCanvas, 0, 0);

                if (mouseX < 0 || mouseY < 0) {
                    requestAnimationFrame(animate);
                    return;
                }

                const startCol = Math.max(0, Math.floor((mouseX - TOTAL_RADIUS) / SPACING));
                const endCol = Math.min(
                    Math.ceil(canvas.width / SPACING),
                    Math.ceil((mouseX + TOTAL_RADIUS) / SPACING)
                );
                const startRow = Math.max(0, Math.floor((mouseY - TOTAL_RADIUS) / SPACING));
                const endRow = Math.min(
                    Math.ceil(canvas.height / SPACING),
                    Math.ceil((mouseY + TOTAL_RADIUS) / SPACING)
                );

                ctx.fillStyle = DOT_COLOR;

                for (let i = startCol; i <= endCol; i++) {
                    const x = i * SPACING;
                    const dx = x - mouseX;
                    const dxSq = dx * dx;
                    const iMod = i % 4 < 2;

                    for (let j = startRow; j <= endRow; j++) {
                        const y = j * SPACING;
                        const dy = y - mouseY;
                        const distSq = dxSq + dy * dy;

                        
                        if (distSq >= TOTAL_RADIUS_SQ) continue;

                        const dist = Math.sqrt(distSq);
                        const isBright = iMod && (j % 4 < 2);


                        const glow = 1 - dist / TOTAL_RADIUS;
                        const eased = glow * glow * glow * glow * glow; // pow(5)
                        const glowBoost = eased * (isBright ? GLOW_BRIGHT : GLOW_DIM);

                        ctx.globalAlpha = glowBoost;
                        ctx.fillRect(x - DOT_RADIUS, y - DOT_RADIUS, DOT_SIZE, DOT_SIZE);
                    }
                }

                ctx.globalAlpha = 1;
                requestAnimationFrame(animate);
            }

            resize();
            animate();
        })();
    </script>
</body>
